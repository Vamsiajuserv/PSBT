name: Deploy PSBT-Portal to Azure

# Runs on every push to main (and can be started manually from the Actions tab).
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

# ── EDIT THESE if you named your Azure resources differently ──────────────────
env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: aj-psbt-api          # your Azure App Service name
  # Real App Service hostname (Azure adds a unique suffix + region):
  API_BASE_URL: https://aj-psbt-api-fcg0fbe3gaeveqgy.southindia-01.azurewebsites.net/api

jobs:
  # ── Build & syntax-check the API ──────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Syntax check
        working-directory: backend
        run: find app -name "*.py" | xargs python -m py_compile && echo "Python syntax OK"
      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: backend/
          retention-days: 1

  # ── Build the website ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: ${{ env.API_BASE_URL }}
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Deploy the API to App Service ─────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: backend/
      - name: Create deployment ZIP
        run: |
          find backend -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find backend -name "*.pyc" -delete 2>/dev/null || true
          cd backend && zip -r ../psbt-api.zip . -x ".venv/*" ".env"
          echo "ZIP size: $(du -sh ../psbt-api.zip | cut -f1)"
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: psbt-api.zip
      - name: Health check
        run: |
          echo "Waiting 120s for the app to build (Oryx) and start..."
          sleep 120
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ env.API_BASE_URL }}/health" || echo 000)
            echo "Attempt $i — /api/health → $STATUS"
            case "$STATUS" in
              200|301|302) echo "API is reachable"; exit 0 ;;
            esac
            sleep 30
          done
          echo "Health check did not succeed (check App Service Log stream)"; exit 1

  # ── Deploy the website to Static Web Apps ─────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Azure Static Web Apps
        run: npx --yes @azure/static-web-apps-cli deploy dist --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" --env production

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    if: always()
    steps:
      - run: |
          echo "### PSBT-Portal Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
